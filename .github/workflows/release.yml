name: Build desktop installers

on:
    push:
        branches: [main]
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            release_tag:
                description: Existing GitHub Release tag
                required: true
                type: string

concurrency:
    group: desktop-build-${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Build ${{ matrix.name }}
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macOS
                      runner: macos-latest
                      target: dist-mac
                      artifact: macos-installers
                    - name: Windows
                      runner: windows-latest
                      target: dist-win
                      artifact: windows-installers

        steps:
            - name: Check out source
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate release version
              if: github.event_name != 'push'
              env:
                  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
              shell: bash
              run: |
                  package_version="$(node --print "require('./package.json').version")"
                  release_version="${RELEASE_TAG#v}"

                  if [[ "${release_version}" != "${package_version}" ]]; then
                      echo "Release tag ${RELEASE_TAG} does not match package.json version ${package_version}."
                      exit 1
                  fi

            - name: Build installers
              run: pnpm nx run pet-host:${{ matrix.target }} --skip-nx-cache

            - name: Store installers
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: |
                      release/*.dmg
                      release/*.exe
                      release/*.zip
                  if-no-files-found: error
                  retention-days: 7

    publish:
        name: Attach installers to release
        if: github.event_name != 'push'
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Download installers
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Upload installers to GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
              run: gh release upload "${RELEASE_TAG}" release-assets/* --clobber
